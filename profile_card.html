<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Summary - TravelMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-header h2 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: #666;
            font-size: 1rem;
        }

        .profile-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .labels-column, .values-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #555;
            font-size: 1rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .profile-details {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .labels-column, .values-column {
                gap: 1rem;
            }

            .profile-card {
                padding: 1.5rem;
            }

            .profile-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-header">
            <h2>👤 User Profile Summary</h2>
            <p>Your account details at a glance</p>
        </div>
        <div class="profile-details">
            <div class="labels-column">
                <div class="detail-label">Full Name</div>
                <div class="detail-label">Email</div>
                <div class="detail-label">Phone</div>
                <div class="detail-label">Location</div>
                <div class="detail-label">Member Since</div>
                <div class="detail-label">Account Status</div>
            </div>
            <div class="values-column">
                <div class="detail-value" id="fullName">John Doe</div>
                <div class="detail-value" id="email">john.doe@example.com</div>
                <div class="detail-value" id="phone">+1 (555) 123-4567</div>
                <div class="detail-value" id="location">New York, USA</div>
                <div class="detail-value" id="memberSince">February 2026</div>
                <div class="detail-value" id="status">Active</div>
            </div>
        </div>
    </div>

    <script>
        // Example: Populate with actual user data
        // This would typically come from localStorage, session, or API
        const userData = {
            fullName: localStorage.getItem('userName') || 'John Doe',
            email: localStorage.getItem('userEmail') || 'john.doe@example.com',
            phone: localStorage.getItem('userPhone') || '+1 (555) 123-4567',
            location: localStorage.getItem('userLocation') || 'New York, USA',
            memberSince: 'February 2026',
            status: 'Active'
        };

        // Update the card with user data
        Object.keys(userData).forEach(key => {
            const element = document.getElementById(key);
            if (element) {
                element.textContent = userData[key];
            }
        });
    </script>
</body>
</html></content>
